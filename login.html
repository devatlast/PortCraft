<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div id="auth-container" class="hidden">

      <div id="signup-form">
         <form id="signup-section">
            <h2>Create Your Account</h2>
            <input type="text" id="signup-username" placeholder="username" required>
            <input type="password" id="signup-pwd" placeholder="Password" required>
            <button type="submit" class="auth-btn">SIGNUP</button>
         </form>
         <p>Already have an account? <a href="#" id="switch-to-login">Click here to login</a></p>
      </div>


      <div id="login-form">
         <form id="login-section" >
            <h2>Open Workshop</h2>
            <input type="text" id="login-username" placeholder="username" required>
            <input type="password" id="login-pwd" placeholder="Password" required>
            <button type="submit" class="auth-btn">LOGIN</button>
         </form>

         <p>New Here? <a href="#" id="switch-to-signup">Click here to Sign up</a></p>
      </div>
      <div id="message" style="display: none;">
         <p id="err-msg">Username/Password does not exist.</p>
         <p id="suc-msg">Welcome back!</p>
      </div>


    </div>
    <script src="/login.js"></script>
</body>
</html>
